<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ Checkers in WebAssembly</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="game-area">
            <div class="options-panel">
                <label for="game-mode">Mode:</label>
                <select id="game-mode">
                    <option value="1vscpu">1 vs Computer</option>
                    <option value="1vs1">1 vs 1</option>
                </select>
                <button id="reset-game">Restart</button>
            </div>

            <div class="status-panel">
                <h2 id="turn-indicator">Loading Engine...</h2>
                <div class="loader" id="loader"></div>
            </div>
            
            <div id="board-container">
                <div id="board"></div>
            </div>
        </div>
    </div>

    <!-- Load the Emscripten output -->
    <script src="checkers.js"></script>
    <!-- Our custom logic -->
    <script src="app.js"></script>
</body>
</html>
